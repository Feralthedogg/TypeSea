name: Publish

on:
    release:
        types:
            - published
    workflow_dispatch:
        inputs:
            tag:
                description: Release tag to publish.
                required: true
                type: string

permissions:
    contents: read
    id-token: write

jobs:
    publish:
        name: Publish to npm
        if: ${{ github.event_name == 'workflow_dispatch' || (!github.event.release.prerelease && !github.event.release.draft) }}
        runs-on: ubuntu-latest
        timeout-minutes: 20
        environment: npm-publish
        env:
            RELEASE_TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ env.RELEASE_TAG_NAME }}

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20.19"
                  registry-url: https://registry.npmjs.org
                  cache: npm

            - name: Install
              run: npm ci

            - name: Verify Release Tag
              run: |
                  node --input-type=module <<'EOF'
                  import { readFileSync } from "node:fs";

                  const metadata = JSON.parse(readFileSync("package.json", "utf8"));
                  const expected = `v${metadata.version}`;
                  if (process.env.RELEASE_TAG_NAME !== expected) {
                      console.error(`release tag must be ${expected}`);
                      process.exitCode = 1;
                  }
                  EOF

            - name: Release Gate
              run: npm run release:check

            - name: Publish
              run: npm run release:publish
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Verify Published Version
              run: npm run release:verify-published
