name: CI

on:
    push:
        branches:
            - main
    pull_request:

permissions:
    contents: read

jobs:
    check:
        name: Node ${{ matrix.node-version }}
        runs-on: ubuntu-latest
        timeout-minutes: 15
        strategy:
            fail-fast: false
            matrix:
                node-version:
                    - "20.19"
                    - "22"
                    - "24"

        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  persist-credentials: false

            - name: Setup Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: npm

            - name: Install
              run: npm ci

            - name: Check
              run: npm run check

    release-gate:
        name: Release Gate
        runs-on: ubuntu-latest
        timeout-minutes: 20
        needs: check

        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  persist-credentials: false

            - name: Setup Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: "20.19"
                  cache: npm

            - name: Install
              run: npm ci

            - name: Release Gate
              run: npm run release:check
