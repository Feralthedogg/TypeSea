    <rect width="1120" height="930" rx="24" fill="url(#bg)"/>
    <text x="44" y="58" class="title">TypeSea benchmark comparison</text>
    <text x="46" y="88" class="subtitle">Generated from bench/results/latest.json. Local run 2026-07-11 KST, ops/sec, higher is better.</text>
